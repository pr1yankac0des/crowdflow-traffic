services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - CROWDFLOW_DEMO_MODE=True
      - CROWDFLOW_SIMULATION_TICK_SECONDS=2.0
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8000
        - VITE_WS_URL=ws://localhost:8000/ws/live
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
